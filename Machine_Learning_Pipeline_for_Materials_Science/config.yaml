#
# Configuration file for machine learning pipeline applied to atomic feature classification.
#
data:
  phase_A_csv:
    - "data/features_5050.csv"
  phase_A_group_id: 101

  phase_B_csv:
    - "data/features_4654.csv"
  phase_B_group_id: 123

  phase_C_csv:
    - "data/features_6436.csv"
  phase_C_group_id: 145

  unlabeled_csv: "data/features_polyamorphous.csv"

  group_col: "group_id"

  target_column: "phase_label"

# -----------------------------------------------------------------------------
# Atomic Radii (angstrom) — used for free volume and packing fraction
# -----------------------------------------------------------------------------
# Map atom type to its metallic radius. Add entries for each type in the system.
atomic_radii:
  1: 1.28   # Cu, metallic (CN12) radius
  2: 1.60   # Zr, metallic (CN12) radius

features: [R1, sqrt3_peak, sqrt4_peak, sqrt7_peak, sqrt12_peak, sqrt3_ratio, sqrt4_ratio, sqrt7_ratio, sqrt12_ratio, voronoi_volume_temporal, CN_temporal, q4, q6, w4, w6, q4_avg, q6_avg, neighbor_1, neighbor_2, R3_minus_R1, R4_minus_R1, R7_minus_R1, R12_minus_R1, R4_minus_R3, R7_minus_R4, R12_minus_R7, entropy, q4_divide_q6, q4_power_2, q6_power_2, R1_time_CN_temporal, R3_minus_R1_time_q4, sqrt3_ratio_divide_sqrt4_ratio, CN_time_q4, CN_time_q6, entropy_time_q4, entropy_time_q6, CN_norm_type, Voronoi_norm_type, CN_density, log_CN, log_voronoi, neighbor_1_ratio, neighbor_2_ratio, atomic_radius, atomic_sphere_volume, free_volume_temporal, packing_fraction_temporal, neighbor_1_fraction_temporal, volume_q6_interaction, volume_per_neighbor, n3_temporal, n4_temporal, n5_temporal, n6_temporal, pentagon_fraction_temporal, asphericity_temporal, asphericity_std_temporal]
  # Core structural descriptors (non-redundant, highest SHAP importance)


#
# --- Machine Learning Settings ---
#
ml:
  random_state: 42

  test_size_groups: 0.2

  models:
    RandomForest:
      class: "sklearn.ensemble.RandomForestClassifier"
      n_iter_search: 48
      params:
        n_jobs: -1
        random_state: 42
        class_weight: "balanced"
      tuning_params:
        classifier__n_estimators: [100, 200, 300, 500]
        classifier__max_depth: [5, 10, 20, 30, 50]
        classifier__min_samples_split: [2, 5, 10]

    HistGB:
      class: "sklearn.ensemble.HistGradientBoostingClassifier"
      n_iter_search: 48
      params:
        random_state: 42
        early_stopping: True         # Stops when validation score plateaus — cuts training time
        validation_fraction: 0.1     # Uses 10% of data as internal validation set
        n_iter_no_change: 10         # Stops after 10 rounds with no improvement
      tuning_params:
        classifier__max_iter: [100, 200, 300, 500]
        classifier__learning_rate: [0.1, 0.05, 0.01]
        classifier__max_leaf_nodes: [15, 31, 63]
        classifier__min_samples_leaf: [10, 20, 30]

    # Fast linear SVC (scales O(n) vs O(n²) for kernel SVC)
    LinearSVC:
      class: "sklearn.svm.LinearSVC"
      n_iter_search: 10
      params:
        class_weight: "balanced"
        random_state: 42
        max_iter: 5000
        dual: false          # Primal is faster when n_samples >> n_features (20k >> 9)
      tuning_params:
        classifier__C: [0.01, 0.1, 1, 10, 100]
        classifier__loss: ['squared_hinge']

    # SVC removed — LinearSVC achieves the same CV score in 1/12th the time


#
# --- Hyperparameter Tuning Settings ---
#
tuning:
  method: "randomized"
  n_iter: 48
  cv_folds: 5
  n_jobs: -1


# -----------------------------------------------------------------------------
# Prediction Settings (for apply_model_to_unlabeled)
# -----------------------------------------------------------------------------
prediction:
  confidence_threshold: 0.90     # Min probability for confident assignment; below this -> -1 (uncertain)

#
# --- Output and Reproducibility Settings ---
#
output:
  model_path: "outputs/models/best_pipeline.joblib"
  reports_dir: "outputs/reports/"
  plots_dir: "outputs/plots/"
  SHAP_Data_dir: "outputs/shap_data/"
  predictions_out: "predictions.csv"